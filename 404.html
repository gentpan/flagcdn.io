<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>404 — Page Not Found | flagcdn.io</title>
  <link href="/assets/main.css" rel="stylesheet" />
  <style>
    .error-page {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      text-align: center;
      padding: 2rem 1rem;
    }
    .error-code {
      font-family: 'Cairo Play', sans-serif;
      font-size: 5rem;
      font-weight: 900;
      color: var(--bs-accent);
      line-height: 1;
      margin-bottom: 0.5rem;
    }
    .error-title {
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--bs-body-color);
      margin-bottom: 0.5rem;
    }
    .error-desc {
      font-size: 0.95rem;
      color: var(--bs-tertiary-color);
      margin-bottom: 1.5rem;
      max-width: 28em;
    }
    .error-link {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.5rem 1.25rem;
      background: var(--bs-primary);
      color: #fff;
      text-decoration: none;
      border-radius: 4px;
      font-size: 0.9rem;
      font-weight: 500;
      transition: background 0.2s;
    }
    .error-link:hover {
      background: var(--bs-primary-hover);
      color: #fff;
    }
  </style>
  <script>
    (function(){ var t = localStorage.getItem("flagcdn-theme"); if (t === "dark" || t === "light") document.documentElement.setAttribute("data-theme", t); })();
  </script>
</head>
<body>
  <div class="error-page">
    <div class="error-code">404</div>
    <h1 class="error-title">Page Not Found</h1>
    <p class="error-desc">The page you're looking for doesn't exist or has been moved. Try searching for a flag on the homepage.</p>
    <a href="/" class="error-link">Back to flagcdn.io</a>
  </div>
</body>
</html>
