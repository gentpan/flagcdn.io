<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Bookmark Organizer Settings</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <main class="wrap">
      <header class="hero">
        <p class="eyebrow">AI Bookmark Organizer</p>
        <h1>设置你自己的 AI API</h1>
        <p>支持 OpenAI 兼容的 `chat/completions` 接口。Token 只保存在当前浏览器的本地扩展存储中。</p>
      </header>

      <section class="card form-grid">
        <label>
          <span>API Endpoint</span>
          <input id="apiEndpoint" type="url" placeholder="https://api.openai.com/v1/chat/completions" />
        </label>

        <label>
          <span>Model</span>
          <input id="model" type="text" placeholder="gpt-4.1-mini" />
        </label>

        <label class="full">
          <span>API Token</span>
          <input id="apiToken" type="password" placeholder="sk-..." />
        </label>

        <label>
          <span>Temperature</span>
          <input id="temperature" type="number" min="0" max="2" step="0.1" />
        </label>

        <label>
          <span>Max Bookmarks per Run</span>
          <input id="maxBookmarks" type="number" min="10" step="1" />
        </label>

        <label class="full">
          <span>Target Root Folder</span>
          <input id="rootFolderName" type="text" placeholder="AI Organized" />
        </label>

        <label class="full">
          <span>Custom Instructions</span>
          <textarea id="customInstructions" rows="8"></textarea>
        </label>
      </section>

      <section class="actions">
        <button id="saveBtn" class="primary">保存设置</button>
        <button id="resetBtn" class="secondary">恢复默认</button>
      </section>

      <section class="card">
        <pre id="statusBox">设置页已加载。</pre>
      </section>
    </main>
    <script src="options.js"></script>
  </body>
  </html>
