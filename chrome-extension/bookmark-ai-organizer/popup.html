<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Bookmark Organizer</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="app">
      <section class="hero">
        <p class="eyebrow">AI Bookmark Organizer</p>
        <h1>用你自己的 AI 整理 Chrome 书签</h1>
        <p class="subtitle">先扫描，再生成计划，最后确认执行移动。</p>
      </section>

      <section class="actions">
        <button id="scanBtn" class="btn secondary">扫描书签</button>
        <button id="generateBtn" class="btn primary">生成整理计划</button>
        <button id="applyBtn" class="btn danger">应用计划</button>
      </section>

      <section class="quick-links">
        <button id="openOptionsBtn" class="link-btn">打开设置</button>
      </section>

      <section class="panel">
        <div class="panel-title">状态</div>
        <pre id="statusBox" class="status">准备就绪。</pre>
      </section>

      <section class="panel">
        <div class="panel-title">计划 JSON</div>
        <textarea id="planBox" spellcheck="false" placeholder="生成后会显示 AI 整理计划，你也可以手动微调再应用。"></textarea>
      </section>
    </main>
    <script src="popup.js"></script>
  </body>
  </html>
